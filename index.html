<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Editor</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
}

:root {
  --qaq-bg: #FDF2F0;
  --qaq-font: #FFE4E1;
  --qaq-accent: #8B4513;
  --qaq-dark: #5C2E0A;
  --qaq-light: #FFF5F3;
  --qaq-border: #D4A574;
  --qaq-shadow: rgba(139, 69, 19, 0.15);
  --qaq-text-dark: #3E1A00;
  --qaq-text-mid: #6B3A1F;
  --qaq-code-bg: #2D1810;
  --qaq-code-text: #F0D6C8;
}

body {
  background-color: var(--qaq-bg);
  color: var(--qaq-font);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== Top Bar ===== */
.qaq-topbar {
  background-color: var(--qaq-bg);
  border-bottom: 2px solid var(--qaq-border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 1000;
  box-shadow: 0 2px 8px var(--qaq-shadow);
}

.qaq-topbar-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--qaq-accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

.qaq-notice-btn {
  background: none;
  border: 1.5px solid var(--qaq-accent);
  color: var(--qaq-accent);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}

.qaq-notice-btn:hover {
  background: var(--qaq-accent);
  color: var(--qaq-light);
}

/* ===== Tab Navigation ===== */
.qaq-tabs {
  display: flex;
  background: var(--qaq-light);
  border-bottom: 2px solid var(--qaq-border);
}

.qaq-tab {
  flex: 1;
  padding: 14px 20px;
  text-align: center;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: var(--qaq-text-mid);
  border-bottom: 3px solid transparent;
  transition: all 0.25s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}

.qaq-tab:hover {
  color: var(--qaq-accent);
  background: rgba(139, 69, 19, 0.05);
}

.qaq-tab.qaq-active {
  color: var(--qaq-accent);
  border-bottom-color: var(--qaq-accent);
  background: rgba(139, 69, 19, 0.08);
}

/* ===== Panels ===== */
.qaq-panel {
  display: none;
  padding: 20px;
  max-width: 960px;
  margin: 0 auto;
}

.qaq-panel.qaq-active {
  display: block;
}

/* ===== Section Title ===== */
.qaq-section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--qaq-accent);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1.5px solid var(--qaq-border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===== Preview Panel ===== */
.qaq-preview-input-area {
  margin-bottom: 16px;
}

.qaq-textarea {
  width: 100%;
  min-height: 180px;
  background: var(--qaq-code-bg);
  color: var(--qaq-code-text);
  border: 1.5px solid var(--qaq-border);
  border-radius: 8px;
  padding: 14px;
  font-family: "Consolas", "Courier New", monospace;
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}

.qaq-textarea:focus {
  border-color: var(--qaq-accent);
}

.qaq-btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.qaq-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: 1.5px solid var(--qaq-accent);
  background: var(--qaq-light);
  color: var(--qaq-accent);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
}

.qaq-btn:hover {
  background: var(--qaq-accent);
  color: var(--qaq-light);
}

.qaq-btn:hover svg path,
.qaq-btn:hover svg rect,
.qaq-btn:hover svg line,
.qaq-btn:hover svg polyline,
.qaq-btn:hover svg circle,
.qaq-btn:hover svg polygon {
  stroke: var(--qaq-light);
}

.qaq-btn-primary {
  background: var(--qaq-accent);
  color: var(--qaq-light);
}

.qaq-btn-primary svg path,
.qaq-btn-primary svg rect,
.qaq-btn-primary svg line,
.qaq-btn-primary svg polyline,
.qaq-btn-primary svg circle {
  stroke: var(--qaq-light);
}

.qaq-btn-primary:hover {
  background: var(--qaq-dark);
  border-color: var(--qaq-dark);
}

.qaq-btn-small {
  padding: 5px 10px;
  font-size: 12px;
}

.qaq-preview-frame-container {
  border: 1.5px solid var(--qaq-border);
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
  position: relative;
  min-height: 300px;
}

.qaq-preview-frame {
  width: 100%;
  min-height: 300px;
  border: none;
  display: block;
}

.qaq-fullscreen-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #fff;
  z-index: 9999;
  flex-direction: column;
}

.qaq-fullscreen-overlay.qaq-show {
  display: flex;
}

.qaq-fullscreen-topbar {
  background: var(--qaq-bg);
  border-bottom: 2px solid var(--qaq-border);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.qaq-fullscreen-topbar span {
  color: var(--qaq-accent);
  font-weight: 700;
  font-size: 15px;
}

.qaq-fullscreen-frame {
  flex: 1;
  border: none;
  width: 100%;
  height: 100%;
}

.qaq-file-input-wrap {
  position: relative;
  display: inline-flex;
}

.qaq-file-input-wrap input[type="file"] {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

/* ===== Make Panel - Form ===== */
.qaq-form {
  background: var(--qaq-light);
  border: 1.5px solid var(--qaq-border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

.qaq-form-group {
  margin-bottom: 16px;
  position: relative;
}

.qaq-form-group:last-child {
  margin-bottom: 0;
}

.qaq-form-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 700;
  color: var(--qaq-accent);
  margin-bottom: 6px;
}

.qaq-form-label .qaq-remove-field {
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px;
  display: flex;
  align-items: center;
}

.qaq-form-input,
.qaq-form-textarea-field {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--qaq-border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--qaq-text-dark);
  background: #fff;
  outline: none;
  transition: border-color 0.2s;
}

.qaq-form-input:focus,
.qaq-form-textarea-field:focus {
  border-color: var(--qaq-accent);
}

.qaq-form-textarea-field {
  min-height: 80px;
  resize: vertical;
  font-family: inherit;
  line-height: 1.5;
}

.qaq-form-hint {
  font-size: 11px;
  color: var(--qaq-text-mid);
  margin-top: 4px;
  opacity: 0.8;
}

.qaq-form-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

/* ===== Generation Area ===== */
.qaq-gen-area {
  background: var(--qaq-light);
  border: 1.5px solid var(--qaq-border);
  border-radius: 10px;
  padding: 20px;
}

.qaq-gen-topbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}

.qaq-gen-messages {
  min-height: 100px;
}

.qaq-gen-msg {
  background: var(--qaq-code-bg);
  border-radius: 8px;
  margin-bottom: 14px;
  overflow: hidden;
  border: 1px solid var(--qaq-border);
}

.qaq-gen-msg-header {
  background: rgba(139, 69, 19, 0.12);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--qaq-accent);
  font-weight: 600;
}

.qaq-gen-msg-code {
  padding: 14px;
  font-family: "Consolas", "Courier New", monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--qaq-code-text);
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 400px;
  overflow-y: auto;
}

.qaq-gen-msg-code.qaq-collapsed {
  max-height: 60px;
  overflow: hidden;
  position: relative;
}

.qaq-gen-msg-code.qaq-collapsed::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30px;
  background: linear-gradient(transparent, var(--qaq-code-bg));
  pointer-events: none;
}

.qaq-gen-msg-code-toggle {
  padding: 6px 14px;
  background: rgba(139, 69, 19, 0.08);
  border: none;
  width: 100%;
  text-align: center;
  cursor: pointer;
  font-size: 12px;
  color: var(--qaq-accent);
  font-weight: 600;
  transition: background 0.15s;
}

.qaq-gen-msg-code-toggle:hover {
  background: rgba(139, 69, 19, 0.15);
}

.qaq-gen-msg-actions {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(139, 69, 19, 0.06);
  flex-wrap: wrap;
}

.qaq-gen-placeholder {
  text-align: center;
  padding: 40px 20px;
  color: var(--qaq-text-mid);
  font-size: 14px;
  opacity: 0.6;
}

/* ===== Modal ===== */
.qaq-modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.45);
  z-index: 5000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.qaq-modal-overlay.qaq-show {
  display: flex;
}

.qaq-modal {
  background: var(--qaq-light);
  border-radius: 12px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  border: 1.5px solid var(--qaq-border);
}

.qaq-modal-header {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--qaq-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.qaq-modal-header h3 {
  color: var(--qaq-accent);
  font-size: 16px;
}

.qaq-modal-close {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  display: flex;
}

.qaq-modal-body {
  padding: 20px;
}

.qaq-modal-footer {
  padding: 12px 20px;
  border-top: 1.5px solid var(--qaq-border);
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.qaq-modal-body .qaq-form-group {
  margin-bottom: 14px;
}

/* ===== Loading ===== */
.qaq-loading {
  display: none;
  text-align: center;
  padding: 30px;
}

.qaq-loading.qaq-show {
  display: block;
}

.qaq-spinner {
  display: inline-block;
  width: 36px;
  height: 36px;
  animation: qaq-spin 1s linear infinite;
}

@keyframes qaq-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.qaq-loading-text {
  margin-top: 10px;
  color: var(--qaq-text-mid);
  font-size: 13px;
}

/* ===== Toast ===== */
.qaq-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--qaq-accent);
  color: var(--qaq-light);
  padding: 10px 24px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 10000;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: 0 4px 16px var(--qaq-shadow);
}

.qaq-toast.qaq-show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Notice Content ===== */
.qaq-notice-content {
  font-size: 13px;
  color: var(--qaq-text-dark);
  line-height: 1.8;
}

.qaq-notice-content h4 {
  color: var(--qaq-accent);
  margin: 10px 0 6px;
  font-size: 14px;
}

.qaq-notice-content p {
  margin-bottom: 8px;
}

.qaq-notice-content ul {
  padding-left: 18px;
  margin-bottom: 8px;
}

.qaq-notice-content ul li {
  margin-bottom: 4px;
  color: var(--qaq-text-mid);
}

/* ===== API Model Select ===== */
.qaq-model-select {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--qaq-border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--qaq-text-dark);
  background: #fff;
  outline: none;
  cursor: pointer;
}

.qaq-model-select:focus {
  border-color: var(--qaq-accent);
}

/* ===== Download Menu ===== */
.qaq-download-menu {
  position: absolute;
  bottom: 100%;
  left: 0;
  background: var(--qaq-light);
  border: 1.5px solid var(--qaq-border);
  border-radius: 6px;
  box-shadow: 0 4px 12px var(--qaq-shadow);
  display: none;
  z-index: 100;
  min-width: 120px;
  margin-bottom: 4px;
}

.qaq-download-menu.qaq-show {
  display: block;
}

.qaq-download-menu-item {
  padding: 8px 14px;
  font-size: 13px;
  color: var(--qaq-text-dark);
  cursor: pointer;
  transition: background 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-weight: 500;
}

.qaq-download-menu-item:hover {
  background: rgba(139, 69, 19, 0.1);
  color: var(--qaq-accent);
}

.qaq-download-menu-item:first-child {
  border-radius: 5px 5px 0 0;
}

.qaq-download-menu-item:last-child {
  border-radius: 0 0 5px 5px;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--qaq-border);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--qaq-accent);
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .qaq-panel {
    padding: 14px;
  }
  .qaq-form {
    padding: 14px;
  }
  .qaq-gen-area {
    padding: 14px;
  }
  .qaq-topbar {
    padding: 10px 14px;
  }
  .qaq-topbar-title {
    font-size: 17px;
  }
}

/* ===== Inline Preview Container ===== */
.qaq-inline-preview-container {
  display: none;
  margin-top: 12px;
  border: 1.5px solid var(--qaq-border);
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
}

.qaq-inline-preview-container.qaq-show {
  display: block;
}

.qaq-inline-preview-header {
  background: rgba(139, 69, 19, 0.1);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.qaq-inline-preview-header span {
  font-size: 13px;
  font-weight: 600;
  color: var(--qaq-accent);
}

.qaq-inline-preview-frame {
  width: 100%;
  min-height: 300px;
  border: none;
  display: block;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="qaq-topbar">
  <div class="qaq-topbar-title">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="3" width="20" height="18" rx="2" stroke="#8B4513" stroke-width="1.8" fill="none"/>
      <line x1="2" y1="8" x2="22" y2="8" stroke="#8B4513" stroke-width="1.5"/>
      <circle cx="5.5" cy="5.5" r="1" fill="#8B4513"/>
      <circle cx="8.5" cy="5.5" r="1" fill="#8B4513"/>
      <circle cx="11.5" cy="5.5" r="1" fill="#8B4513"/>
      <text x="6" y="16" font-size="6" font-weight="700" fill="#8B4513" font-family="monospace">&lt;/&gt;</text>
    </svg>
    HTML Editor
  </div>
  <button class="qaq-notice-btn" onclick="qaqShowNotice()">
    使用须知
  </button>
</div>

<!-- Tabs -->
<div class="qaq-tabs">
  <button class="qaq-tab qaq-active" data-tab="preview" onclick="qaqSwitchTab('preview', this)">
    预览 HTML
  </button>
  <button class="qaq-tab" data-tab="make" onclick="qaqSwitchTab('make', this)">
    制作 HTML
  </button>
</div>

<!-- ==================== Preview Panel ==================== -->
<div class="qaq-panel qaq-active" id="qaq-panel-preview">
  <div class="qaq-preview-input-area">
    <div class="qaq-section-title">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M5 3L1 8L5 13" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 3L15 8L11 13" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="9.5" y1="2" x2="6.5" y2="14" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      代码输入
    </div>
    <textarea class="qaq-textarea" id="qaq-preview-code" placeholder="在此粘贴 HTML / CSS / JS 代码..."></textarea>
    <div class="qaq-btn-row" style="margin-top: 12px;">
      <div class="qaq-file-input-wrap">
        <button class="qaq-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1V10" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M4 4L7 1L10 4" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 9V12H13V9" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          导入文件
        </button>
        <input type="file" accept=".html,.htm,.txt,.docx" onchange="qaqImportFile(event)"/>
      </div>
      <button class="qaq-btn qaq-btn-primary" onclick="qaqPreviewCode()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polygon points="2,1 12,7 2,13" stroke="#FFF5F3" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
        </svg>
        预览
      </button>
      <button class="qaq-btn" onclick="qaqFullscreenPreview('qaq-preview-code')">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <polyline points="1,5 1,1 5,1" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="9,1 13,1 13,5" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="13,9 13,13 9,13" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="5,13 1,13 1,9" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        整体预览
      </button>
      <button class="qaq-btn" onclick="qaqClearPreview()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <line x1="2" y1="2" x2="12" y2="12" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="12" y1="2" x2="2" y2="12" stroke="#8B4513" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        清空
      </button>
    </div>
  </div>

  <div class="qaq-section-title">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <circle cx="8" cy="8" r="3" stroke="#8B4513" stroke-width="1.3" fill="none"/>
      <path d="M1 8C1 8 4 3 8 3C12 3 15 8 15 8C15 8 12 13 8 13C4 13 1 8 1 8Z" stroke="#8B4513" stroke-width="1.3" fill="none"/>
    </svg>
    预览区域
  </div>
  <div class="qaq-preview-frame-container">
    <iframe id="qaq-preview-iframe" class="qaq-preview-frame"></iframe>
  </div>
</div>

<!-- ==================== Make Panel ==================== -->
<div class="qaq-panel" id="qaq-panel-make">
  <!-- Form -->
  <div class="qaq-section-title">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="14" height="14" rx="2" stroke="#8B4513" stroke-width="1.3" fill="none"/>
      <line x1="4" y1="5" x2="12" y2="5" stroke="#8B4513" stroke-width="1.2" stroke-linecap="round"/>

<script>
// ============================
// QAQ Global State
// ============================
const qaqState = {
  apiUrl: '',
  apiKey: '',
  apiModel: '',
  msgCount: 0,
  conversationHistory: [],
  currentModifyIndex: -1
};

// ============================
// Tab Switching
// ============================
function qaqSwitchTab(tabName, btn) {
  document.querySelectorAll('.qaq-tab').forEach(t => t.classList.remove('qaq-active'));
  document.querySelectorAll('.qaq-panel').forEach(p => p.classList.remove('qaq-active'));
  btn.classList.add('qaq-active');
  document.getElementById('qaq-panel-' + tabName).classList.add('qaq-active');
}

// ============================
// Toast
// ============================
function qaqToast(msg) {
  const t = document.getElementById('qaq-toast');
  t.textContent = msg;
  t.classList.add('qaq-show');
  setTimeout(() => t.classList.remove('qaq-show'), 2200);
}

// ============================
// Modal
// ============================
function qaqShowModal(id) {
  document.getElementById(id).classList.add('qaq-show');
}
function qaqCloseModal(id) {
  document.getElementById(id).classList.remove('qaq-show');
}
function qaqShowNotice() {
  qaqShowModal('qaq-modal-notice');
}
function qaqShowApiModal() {
  document.getElementById('qaq-api-url').value = qaqState.apiUrl;
  document.getElementById('qaq-api-key').value = qaqState.apiKey;
  qaqShowModal('qaq-modal-api');
}

// ============================
// Preview Functions
// ============================
function qaqPreviewCode() {
  const code = document.getElementById('qaq-preview-code').value;
  if (!code.trim()) {
    qaqToast('请先输入代码');
    return;
  }
  const iframe = document.getElementById('qaq-preview-iframe');
  qaqRenderToIframe(iframe, code);
  iframe.style.minHeight = '400px';
}

function qaqRenderToIframe(iframe, code) {
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();
}

function qaqFullscreenPreview(sourceId) {
  let code = '';
  if (sourceId === 'qaq-preview-code') {
    code = document.getElementById('qaq-preview-code').value;
  } else {
    code = sourceId; // direct code string
  }
  if (!code.trim()) {
    qaqToast('没有可预览的代码');
    return;
  }
  const overlay = document.getElementById('qaq-fullscreen');
  overlay.classList.add('qaq-show');
  const iframe = document.getElementById('qaq-fullscreen-iframe');
  qaqRenderToIframe(iframe, code);
}

function qaqCloseFullscreen() {
  document.getElementById('qaq-fullscreen').classList.remove('qaq-show');
}

function qaqClearPreview() {
  document.getElementById('qaq-preview-code').value = '';
  const iframe = document.getElementById('qaq-preview-iframe');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write('');
  doc.close();
  qaqToast('已清空');
}

// ============================
// File Import
// ============================
function qaqImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith('.docx')) {
    qaqReadDocxAsync(file);
  } else {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('qaq-preview-code').value = e.target.result;
      qaqToast('文件已导入');
    };
    reader.readAsText(file);
  }
  event.target.value = '';
}

function qaqExtractTextFromDocXml(xml) {
  let output = '';
  const pRegex = /<w:p[ >][\s\S]*?<\/w:p>/g;
  let pMatch;
  while ((pMatch = pRegex.exec(xml)) !== null) {
    const tRegex = /<w:t[^>]*>([^<]*)<\/w:t>/g;
    let tMatch;
    let line = '';
    while ((tMatch = tRegex.exec(pMatch[0])) !== null) {
      line += tMatch[1];
    }
    output += line + '\n';
  }
  output = output
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&amp;/g, '&')
    .replace(/&quot;/g, '"')
    .replace(/&apos;/g, "'")
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  return output;
}

async function qaqReadDocxAsync(file) {
  try {
    const buffer = await file.arrayBuffer();
    const entries = await qaqParseZipAsync(buffer);
    const docEntry = entries['word/document.xml'];
    if (!docEntry) {
      qaqToast('无法解析 DOCX 文件');
      return;
    }
    const text = qaqExtractTextFromDocXml(docEntry);
    if (!text.trim()) {
      qaqToast('DOCX 文件内容为空');
      return;
    }
    document.getElementById('qaq-preview-code').value = text;
    qaqToast('DOCX 文件已导入');
  } catch (err) {
    qaqToast('DOCX 解析失败: ' + err.message);
  }
}

async function qaqParseZipAsync(buffer) {
  const view = new DataView(buffer);
  const files = {};
  let offset = 0;
  while (offset < buffer.byteLength - 30) {
    const sig = view.getUint32(offset, true);
    if (sig !== 0x04034b50) break;
    const compMethod = view.getUint16(offset + 8, true);
    const compSize = view.getUint32(offset + 18, true);
    const uncompSize = view.getUint32(offset + 22, true);
    const nameLen = view.getUint16(offset + 26, true);
    const extraLen = view.getUint16(offset + 28, true);
    const nameBytes = new Uint8Array(buffer, offset + 30, nameLen);
    const fileName = new TextDecoder().decode(nameBytes);
    const dataStart = offset + 30 + nameLen + extraLen;
    if (compMethod === 0) {
      const data = new Uint8Array(buffer, dataStart, uncompSize);
      files[fileName] = new TextDecoder('utf-8').decode(data);
    } else if (compMethod === 8) {
      try {
        const compressed = buffer.slice(dataStart, dataStart + compSize);
        const ds = new DecompressionStream('deflate-raw');
        const writer = ds.writable.getWriter();
        writer.write(new Uint8Array(compressed));
        writer.close();
        const chunks = [];
        const reader = ds.readable.getReader();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
        }
        const totalLen = chunks.reduce((s, c) => s + c.length, 0);
        const result = new Uint8Array(totalLen);
        let pos = 0;
        for (const chunk of chunks) {
          result.set(chunk, pos);
          pos += chunk.length;
        }
        files[fileName] = new TextDecoder('utf-8').decode(result);
      } catch (e) {}
    }
    offset = dataStart + compSize;
  }
  return files;
}

// Override import for async docx
function qaqImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const name = file.name.toLowerCase();
  
  if (name.endsWith('.docx')) {
    qaqReadDocxAsync(file);
  } else {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('qaq-preview-code').value = e.target.result;
      qaqToast('文件已导入');
    };
    reader.readAsText(file);
  }
  event.target.value = '';
}

async function qaqFetchModels() {
  const url = document.getElementById('qaq-api-url').value.trim();
  const key = document.getElementById('qaq-api-key').value.trim();
  
  if (!url || !key) {
    qaqToast('请填写 URL 和 Key');
    return;
  }
  
  try {
    const baseUrl = url.replace(/\/+$/, '');
    const resp = await fetch(baseUrl + '/v1/models', {
      headers: {
        'Authorization': 'Bearer ' + key
      }
    });
    
    if (!resp.ok) {
      qaqToast('拉取失败: ' + resp.status);
      return;
    }
    
    const data = await resp.json();
    const select = document.getElementById('qaq-api-model');
    select.innerHTML = '';
    
    if (data.data && data.data.length > 0) {
      data.data.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.id;
        select.appendChild(opt);
      });
      qaqToast('已拉取 ' + data.data.length + ' 个模型');
    } else {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = '-- 未找到模型 --';
      select.appendChild(opt);
      qaqToast('未找到可用模型');
    }
  } catch (err) {
    qaqToast('拉取模型失败: ' + err.message);
  }
}

function qaqSaveApi() {
  qaqState.apiUrl = document.getElementById('qaq-api-url').value.trim();
  qaqState.apiKey = document.getElementById('qaq-api-key').value.trim();
  qaqState.apiModel = document.getElementById('qaq-api-model').value;
  
  if (qaqState.apiUrl && qaqState.apiKey && qaqState.apiModel) {
    document.getElementById('qaq-api-status').textContent = '已配置: ' + qaqState.apiModel;
    document.getElementById('qaq-api-status').style.color = '#2E7D32';
  } else {
    document.getElementById('qaq-api-status').textContent = 'API 未完整配置';
    document.getElementById('qaq-api-status').style.color = '#C62828';
  }
  
  qaqCloseModal('qaq-modal-api');
  qaqToast('API 设置已保存');
}

// Generation
// ============================
async function qaqGenerate() {
  if (!qaqState.apiUrl || !qaqState.apiKey || !qaqState.apiModel) {
    qaqToast('请先配置 API');
    return;
  }
  
  const instruction = qaqBuildInstruction();
  
  qaqState.conversationHistory = [
    { role: 'system', content: '你是一个专业的HTML前端开发者。用户会给你一些要求，你需要生成完整的HTML页面代码。代码第一行必须是注释 <!-- qaq html editor -->。直接输出代码，不要用markdown代码块包裹，不要添加额外解释。' },
    { role: 'user', content: instruction }
  ];
  
  await qaqCallApi();
}

async function qaqCallApi() {
  const loading = document.getElementById('qaq-loading');
  const placeholder = document.getElementById('qaq-gen-placeholder');
  
  loading.classList.add('qaq-show');
  if (placeholder) placeholder.style.display = 'none';
  
  try {
    const baseUrl = qaqState.apiUrl.replace(/\/+$/, '');
    const resp = await fetch(baseUrl + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + qaqState.apiKey
      },
      body: JSON.stringify({
        model: qaqState.apiModel,
        messages: qaqState.conversationHistory,
        temperature: 0.7,
        max_tokens: 8192
      })
    });
    
    if (!resp.ok) {
      const errText = await resp.text();
      qaqToast('生成失败: ' + resp.status);
      loading.classList.remove('qaq-show');
      return;
    }
    
    const data = await resp.json();
    let content = data.choices[0].message.content;
    
    // Clean up markdown code blocks if present
    content = content.replace(/^```html?\s*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
    
    // Ensure first line comment
    if (!content.startsWith('<!-- qaq html editor -->')) {
      content = '<!-- qaq html editor -->\n' + content;
    }
    
    // Add to conversation
    qaqState.conversationHistory.push({ role: 'assistant', content: content });
    
    // Create message
    qaqState.msgCount++;
    qaqCreateMessage(content, qaqState.msgCount);
    
    loading.classList.remove('qaq-show');
    qaqToast('生成完成');
    
  } catch (err) {
    loading.classList.remove('qaq-show');
    qaqToast('请求失败: ' + err.message);
  }
}

function qaqDownloadCode(index, format) {
  const code = qaqGetCodeByIndex(index);
  document.querySelectorAll('.qaq-download-menu').forEach(m => m.classList.remove('qaq-show'));

    qaqDownloadFile(code, 'qaq-output.html', 'text/html');
  } else if (format === 'txt') {
    qaqDownloadFile(code, 'qaq-output.txt', 'text/plain');
  } else if (format === 'docx') {
    qaqDownloadDocx(code, 'qaq-output.docx');
  }

function qaqDownloadFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  qaqToast('文件已下载');
}

function qaqDownloadDocx(content, filename) {
  // Minimal DOCX generation
  const escapedContent = content
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  
  const lines = escapedContent.split('\n');
  let paragraphs = '';
  lines.forEach(line => {
    paragraphs += `<w:p><w:r><w:rPr><w:rFonts w:ascii="Consolas" w:hAnsi="Consolas"/><w:sz w:val="18"/></w:rPr><w:t xml:space="preserve">${line}</w:t></w:r></w:p>`;
  });
  
  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paragraphs}</w:body></w:document>`;
  
  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
  
  const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
  
  const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
</Relationships>`;
  
  // Build ZIP manually (store method, no compression for simplicity)
  const files = [
    { name: '[Content_Types].xml', data: contentTypes },
    { name: '_rels/.rels', data: rels },
    { name: 'word/document.xml', data: documentXml },
    { name: 'word/_rels/document.xml.rels', data: wordRels }
  ];
  
  const zipData = qaqCreateZip(files);
  const blob = new Blob([zipData], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  qaqToast('DOCX 已下载');
}

function qaqCreateZip(files) {
  const encoder = new TextEncoder();
  const localHeaders = [];
  const centralHeaders = [];
  let offset = 0;
  
  files.forEach(file => {
    const nameBytes = encoder.encode(file.name);
    const dataBytes = encoder.encode(file.data);
    const crc = qaqCrc32(dataBytes);
    
    // Local file header
    const local = new ArrayBuffer(30 + nameBytes.length + dataBytes.length);
    const lv = new DataView(local);
    lv.setUint32(0, 0x04034b50, true); // sig
    lv.setUint16(4, 20, true); // version
    lv.setUint16(6, 0, true); // flags
    lv.setUint16(8, 0, true); // compression: store
    lv.setUint16(10, 0, true); // time
    lv.setUint16(12, 0, true); // date
    lv.setUint32(14, crc, true); // crc32
    lv.setUint32(18, dataBytes.length, true); // compressed
    lv.setUint32(22, dataBytes.length, true); // uncompressed
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true); // extra
    new Uint8Array(local, 30, nameBytes.length).set(nameBytes);
    new Uint8Array(local, 30 + nameBytes.length, dataBytes.length).set(dataBytes);
    
    localHeaders.push(new Uint8Array(local));
    
    // Central directory
    const central = new ArrayBuffer(46 + nameBytes.length);
    const cv = new DataView(central);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, dataBytes.length, true);
    cv.setUint32(24, dataBytes.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    new Uint8Array(central, 46, nameBytes.length).set(nameBytes);
    
    centralHeaders.push(new Uint8Array(central));
    offset += 30 + nameBytes.length + dataBytes.length;
  });
  
  const centralOffset = offset;
  let centralSize = 0;
  centralHeaders.forEach(c => centralSize += c.length);
  
  // End of central directory
  const eocdr = new ArrayBuffer(22);
  const ev = new DataView(eocdr);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);
  
  const parts = [...localHeaders, ...centralHeaders, new Uint8Array(eocdr)];
  let totalSize = 0;
  parts.forEach(p => totalSize += p.length);
  
  const result = new Uint8Array(totalSize);
  let pos = 0;
  parts.forEach(p => {
    result.set(p, pos);
    pos += p.length;
  });
  
  return result;
}

function qaqCrc32(data) {
  let crc = 0xFFFFFFFF;
  const table = qaqCrc32Table();
  for (let i = 0; i < data.length; i++) {
    crc = (crc >>> 8) ^ table[(crc ^ data[i]) & 0xFF];
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

let _qaqCrc32Table = null;
function qaqCrc32Table() {
  if (_qaqCrc32Table) return _qaqCrc32Table;
  _qaqCrc32Table = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) {
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    _qaqCrc32Table[i] = c >>> 0;
  }
  return _qaqCrc32Table;
}

// ============================
// Clipboard
// ============================
function qaqCopyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => {
      qaqFallbackCopy(text);
    });
  } else {
    qaqFallbackCopy(text);
  }
}

function qaqFallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
  } catch (e) {}
  document.body.removeChild(ta);
}

// ============================
// Init
// ============================
(function qaqInit() {
  // Try to load saved API settings
  try {
    const saved = localStorage.getItem('qaq-api-settings');
    if (saved) {
      const s = JSON.parse(saved);
      qaqState.apiUrl = s.url || '';
      qaqState.apiKey = s.key || '';
      qaqState.apiModel = s.model || '';
      if (qaqState.apiUrl && qaqState.apiKey && qaqState.apiModel) {
        document.getElementById('qaq-api-status').textContent = '已配置: ' + qaqState.apiModel;
        document.getElementById('qaq-api-status').style.color = '#2E7D32';
      }
    }
  } catch (e) {}
})();

// Save API settings
const _qaqOrigSaveApi = qaqSaveApi;
qaqSaveApi = function() {
  _qaqOrigSaveApi();
  try {
    localStorage.setItem('qaq-api-settings', JSON.stringify({
      url: qaqState.apiUrl,
      key: qaqState.apiKey,
      model: qaqState.apiModel
    }));
  } catch (e) {}
};
// ============================
// Toggle Code Collapse
// ============================
function qaqToggleCode(index) {
  const codeEl = document.getElementById('qaq-code-' + index);
  const toggleBtn = document.getElementById('qaq-toggle-' + index);
  if (codeEl.classList.contains('qaq-collapsed')) {
    codeEl.classList.remove('qaq-collapsed');
    toggleBtn.textContent = '收起代码 ▲';
  } else {
    codeEl.classList.add('qaq-collapsed');
    toggleBtn.textContent = '展开代码 ▼';
  }
}

// ============================
// Edit Generated Code
// ============================
function qaqEditGenCode(index) {
  const codeEl = document.getElementById('qaq-code-' + index);
  const currentCode = codeEl.textContent;

  // 如果已经在编辑状态就不重复创建
  if (document.getElementById('qaq-edit-area-' + index)) return;

  // 展开代码先
  codeEl.classList.add('qaq-collapsed');
  codeEl.style.display = 'none';
  const toggleBtn = document.getElementById('qaq-toggle-' + index);
  if (toggleBtn) toggleBtn.style.display = 'none';

  const editWrap = document.createElement('div');
  editWrap.id = 'qaq-edit-area-' + index;
  editWrap.style.padding = '0';

  const editArea = document.createElement('textarea');
  editArea.className = 'qaq-textarea';
  editArea.style.minHeight = '250px';
  editArea.style.borderRadius = '0';
  editArea.style.border = 'none';
  editArea.style.borderBottom = '1px solid var(--qaq-border)';
  editArea.value = currentCode;

  const editBtnRow = document.createElement('div');
  editBtnRow.style.cssText = 'padding: 8px 14px; display: flex; gap: 8px; background: rgba(139,69,19,0.06);';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'qaq-btn qaq-btn-small qaq-btn-primary';
  saveBtn.textContent = '保存';
  saveBtn.onclick = function () {
    const newCode = editArea.value;
    codeEl.textContent = newCode;
    codeEl.style.display = '';
    codeEl.classList.remove('qaq-collapsed');
    codeEl.classList.add('qaq-collapsed');
    if (toggleBtn) {
      toggleBtn.style.display = '';
      toggleBtn.textContent = '展开代码 ▼';
    }
    editWrap.remove();
    // 同步到对话历史
    for (let i = qaqState.conversationHistory.length - 1; i >= 0; i--) {
      if (qaqState.conversationHistory[i].role === 'assistant') {
        qaqState.conversationHistory[i].content = newCode;
        break;
      }
    }
    qaqToast('代码已保存');
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'qaq-btn qaq-btn-small';
  cancelBtn.textContent = '取消';
  cancelBtn.onclick = function () {
    codeEl.style.display = '';
    if (toggleBtn) toggleBtn.style.display = '';
    editWrap.remove();
  };

  editBtnRow.appendChild(saveBtn);
  editBtnRow.appendChild(cancelBtn);
  editWrap.appendChild(editArea);
  editWrap.appendChild(editBtnRow);

  codeEl.parentNode.insertBefore(editWrap, codeEl.nextSibling);
}
</script>
